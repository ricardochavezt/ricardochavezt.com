---
layout: default
---

<div class="h-entry">
    <h1 class="p-name">{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}" class="dt-published">
        Posted on {{ page.date | date: "%B %-d, %Y" }} |
    </time>
    <a href="{{ site.baseurl }}{{ page.url }}" class="u-url">Permalink</a>
    <a href="/" class="p-author h-card" rel="author">{{ site.author }}</a>

    <!-- {{ page.categories }} -->
    <content class="e-content">
      {{ content }}
    </content>
</div>
